  <text x="592" y="553" fill="#707a8c" font-size="12">1. UserService.findById() — cache key: user:{id}, TTL: 5min</text>
  <text x="592" y="568" fill="#707a8c" font-size="12">2. ProductService.findAll() — cache key: products:list, TTL: 1min</text>

